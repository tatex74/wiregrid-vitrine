name: Deploy to Cloudflare

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    # Only deploy if the triggering CI run succeeded (or if triggered manually)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Astro build
        run: npm run build
        env:
          # Public Turnstile siteKey, embedded in the static HTML at build
          # time via import.meta.env.PUBLIC_TURNSTILE_SITE_KEY in
          # src/components/TrialForm.astro. Posed as a GitHub Actions
          # repository variable (not secret — value is public, visible
          # in HTML). If unset, TrialForm.astro falls back to Cloudflare's
          # always-pass test siteKey, which is fine for staging but should
          # be set in prod.
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Smoke test wiregrid.fr
        run: |
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://wiregrid.fr)
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "❌ Smoke test failed: got HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Smoke test passed (HTTP $HTTP_CODE)"
