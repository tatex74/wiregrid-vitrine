name: ci

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Astro build
        run: npm run build

      - name: Verify dist/ has index
        run: |
          test -f dist/index.html || (echo "dist/index.html missing" && exit 1)
          test -f dist/fr/index.html || (echo "dist/fr/index.html missing" && exit 1)
          test -f dist/en/index.html || (echo "dist/en/index.html missing" && exit 1)
